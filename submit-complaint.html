<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Submit Complaint - HostelConnect</title>

<link rel="stylesheet" href="css/styles.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard-container">

<!-- SIDEBAR -->

<aside class="sidebar">

<h2 class="logo">HostelConnect</h2>

<ul class="sidebar-menu">

<li onclick="location.href='dashboard.html'">
Dashboard
</li>

<li class="active">
Submit Complaint
</li>

<li onclick="location.href='complaints.html'">
My Complaints
</li>

<li onclick="location.href='notifications.html'">
Notifications
</li>

<li onclick="location.href='profile.html'">
Profile
</li>

</ul>

</aside>


<!-- MAIN AREA -->

<div class="main-area">

<!-- TOPBAR -->

<div class="topbar">

<h1>Submit Complaint</h1>

<div class="topbar-right">

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<span class="notification">🔔</span>

<div class="profile">Admin</div>

</div>

</div>


<!-- COMPLAINT FORM -->

<div class="table-section">

<h2>Complaint Details</h2>

<form id="complaintForm">

<label>Complaint Title</label>
<input type="text" placeholder="Enter complaint title" required>

<label>Category</label>

<select required>

<option value="">Select Category</option>
<option>Electrical</option>
<option>Plumbing</option>
<option>Internet</option>
<option>Mess</option>
<option>Cleaning</option>
<option>Other</option>

</select>

<label>Room Number</label>
<input type="text" placeholder="Enter your room number" required>

<label>Complaint Description</label>

<textarea rows="5" placeholder="Describe your issue in detail..." required></textarea>

<button type="submit">Submit Complaint</button>

</form>

</div>

</div>

</div>

<script src="js/dashboard.js"></script>

<script>

document.getElementById("complaintForm").addEventListener("submit", function(e){

e.preventDefault();

alert("Complaint submitted successfully!");

});

</script>

</body>

</html>
