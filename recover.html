<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recover Account - HostelConnect</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body class="login-page">

<div class="login-card">

<h1>Recover Account</h1>

<p class="subtitle">
Enter your registered hostel email.  
Your username and password will be sent to your email.
</p>

<form id="recoverForm">

<label>Email Address</label>
<input type="email" placeholder="Enter your registered email" required>

<button type="submit">Send Details</button>

</form>

<p class="recovery">
<a href="index.html">Back to Login</a>
</p>

</div>

<script>

document.getElementById("recoverForm").addEventListener("submit", function(e){

e.preventDefault();

alert("Credentials will be sent to your registered email.");

});

</script>

</body>
</html>
